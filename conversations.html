<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Conversations — BoutiqueAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
.customers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.customer-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:var(--t);box-shadow:var(--sh-sm)}
.customer-card:hover{box-shadow:var(--sh);border-color:var(--border-md);transform:translateY(-1px)}
.customer-card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
.customer-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;font-family:var(--mono)}
.customer-info{flex:1;min-width:0}
.customer-phone{font-size:13.5px;font-weight:700;font-family:var(--mono);color:var(--text);letter-spacing:.02em}
.customer-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.agent-chip-sm{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}
.tryon-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:10px 12px;background:var(--surface-2)}
.tryon-thumb{aspect-ratio:3/4;border-radius:6px;overflow:hidden;background:var(--surface-3);position:relative;cursor:pointer}
.tryon-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .2s ease;display:block}
.tryon-thumb:hover img{transform:scale(1.06)}
.tryon-thumb-empty{display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:20px;height:100%}
.tryon-more-badge{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;font-family:var(--mono)}
.customer-card-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border)}
.customer-footer-stats{display:flex;align-items:center;gap:12px}
.customer-stat{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--text-3)}
.customer-stat strong{color:var(--text);font-weight:700}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{padding-left:34px;width:100%}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;opacity:.5}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .2s ease;pointer-events:none}
#lightbox.open{opacity:1;pointer-events:all}
#lightbox img{max-width:100%;max-height:90vh;border-radius:var(--r-lg);box-shadow:0 24px 80px rgba(0,0,0,.6);transform:scale(.96);transition:transform .22s ease}
#lightbox.open img{transform:scale(1)}
#lb-close{position:fixed;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:1000}
#lb-close:hover{background:rgba(255,255,255,.22)}
#lb-caption{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:12px;padding:7px 16px;border-radius:20px;font-family:var(--mono);white-space:nowrap;z-index:1000}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:18px 0 0;flex-wrap:wrap;gap:10px}
.page-info{font-size:12.5px;color:var(--text-3)}
.page-btns{display:flex;gap:6px}
@media(max-width:640px){.customers-grid{grid-template-columns:1fr}.tryon-strip{grid-template-columns:repeat(3,1fr)}}
</style>
<link rel="stylesheet" href="shared.css">
<script>
;(function(){
  var d=localStorage.getItem('ba_theme')==='dark';
  document.documentElement[d?'setAttribute':'removeAttribute']('data-theme','dark');
  document.documentElement.style.background=d?'#07080D':'#F2F3F9';
})();
</script>
<script src="api.js"></script>
<script src="nav.js"></script>
</head>
<body>
<div id="toast-container"></div>
<div class="mobile-topbar">
  <div class="mob-left">
    <button class="hamburger" onclick="openMobileSidebar()">
      <svg viewBox="0 0 16 16"><line x1="1" y1="4" x2="15" y2="4"/><line x1="1" y1="8" x2="15" y2="8"/><line x1="1" y1="12" x2="15" y2="12"/></svg>
    </button>
    <a class="mob-logo" href="home.html">Boutique<span>AI</span></a>
  </div>
  <div class="mob-right"><button class="theme-toggle" style="font-size:15px;"></button></div>
</div>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeMobileSidebar()"></div>
<div class="sidebar" id="sidebar"></div>

<div id="page-skeleton">
  <div class="skel-topbar">
    <div class="skel" style="height:13px;width:180px;border-radius:4px"></div>
  </div>
  <div class="skel-body">
    <div class="stats-row" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
      <div class="skel" style="height:78px;border-radius:var(--r-lg)"></div>
      <div class="skel" style="height:78px;border-radius:var(--r-lg);opacity:.8"></div>
      <div class="skel" style="height:78px;border-radius:var(--r-lg);opacity:.6"></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
      <div class="skel" style="height:220px;border-radius:var(--r-lg)"></div>
      <div class="skel" style="height:220px;border-radius:var(--r-lg);opacity:.8"></div>
      <div class="skel" style="height:220px;border-radius:var(--r-lg);opacity:.6"></div>
    </div>
  </div>
</div>

<div class="main-wrap">
  <div class="topbar">
    <div class="topbar-left"><span class="topbar-title">Conversations</span></div>
    <div class="topbar-right">
      <button class="theme-toggle" style="font-size:15px;"></button>
    </div>
  </div>

  <div class="content" id="page-content" style="display:none">

    <div class="stats-row" style="grid-template-columns:repeat(3,1fr);margin-bottom:22px">
      <div class="stat-card">
        <div class="stat-icon-wrap">👤</div>
        <div class="stat-info">
          <div class="stat-label">Total Customers</div>
          <div class="stat-value loading" id="s-customers">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap">👗</div>
        <div class="stat-info">
          <div class="stat-label">Try-Ons Generated</div>
          <div class="stat-value loading" id="s-tryons">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap">🤖</div>
        <div class="stat-info">
          <div class="stat-label">Published Agents</div>
          <div class="stat-value loading" id="s-agents">—</div>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="input" id="phone-search" placeholder="Search by phone number…" oninput="onSearch()">
      </div>
      <select class="select" id="agent-filter" style="width:auto;min-width:190px" onchange="onFilterChange()">
        <option value="">All Agents</option>
      </select>
      <button class="btn btn-secondary btn-sm" onclick="loadCustomers(true)" id="refresh-btn">↻ Refresh</button>
    </div>

    <div id="customers-grid" class="customers-grid"></div>

    <div class="pagination" id="pagination-wrap" style="display:none">
      <span class="page-info" id="page-info">—</span>
      <div class="page-btns">
        <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="changePage(-1)" disabled>← Prev</button>
        <button class="btn btn-secondary btn-sm" id="btn-next" onclick="changePage(1)">Next →</button>
      </div>
    </div>

  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-caption"></div>
</div>

<script>
let currentSkip  = 0
let currentTotal = 0
const LIMIT      = 24
let agentsMap    = {}
let searchTimer  = null

// ── Phone mask ────────────────────────────────────────────
function maskPhone(mobile) {
  if (!mobile) return '—'
  const m = String(mobile).replace(/\D/g,'').slice(-10)
  if (m.length < 6) return mobile
  return '+91 ' + m.slice(0,2) + 'X'.repeat(m.length-6) + m.slice(-4)
}

function phoneInitial(mobile) {
  return String(mobile||'').replace(/\D/g,'').slice(-1) || '?'
}

function fmtDay(iso) {
  if (!iso) return ''
  return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short'})
}

// ── Agents ────────────────────────────────────────────────
async function loadAgents() {
  try {
    const data = await apiFetch('/agents')
    const agents = data.agents || []
    agentsMap = {}
    agents.forEach(a => { agentsMap[a._id] = a })

    const sel = document.getElementById('agent-filter')
    agents.forEach(a => {
      const o = document.createElement('option')
      o.value = a._id
      o.textContent = a.agent_name || a.business_name || 'Agent'
      sel.appendChild(o)
    })

    const pub = agents.filter(a => a.published).length
    document.getElementById('s-agents').textContent = pub
    document.getElementById('s-agents').classList.remove('loading')
    return agents
  } catch(e) { return [] }
}

// ── Main load ─────────────────────────────────────────────
async function loadCustomers(resetPage = false) {
  if (resetPage) currentSkip = 0
  const btn = document.getElementById('refresh-btn')
  btn.disabled = true; btn.textContent = '↻ Loading…'

  const agentId = document.getElementById('agent-filter').value

  try {
    // Try /owner/customers first (new endpoint)
    // Falls back to manual aggregation from /agents/:id/tryons
    let customers = [], total = 0, totalTryons = 0

    try {
      let qs = `limit=${LIMIT}&skip=${currentSkip}`
      if (agentId) qs += `&agent_id=${agentId}`
      const data = await apiFetch(`/owner/customers?${qs}`)
      if (data && Array.isArray(data.customers)) {
        customers   = data.customers
        total       = data.total || customers.length
        totalTryons = data.total_tryons || 0
      } else throw new Error('use fallback')
    } catch {
      customers   = await fallbackLoadCustomers(agentId)
      total       = customers.length
      totalTryons = customers.reduce((s,c)=>s+(c.tryon_count||0),0)
    }

    currentTotal = total

    // Filter by phone search (client-side for fallback)
    const phoneQ = document.getElementById('phone-search').value.replace(/\D/g,'')
    if (phoneQ) {
      customers = customers.filter(c => String(c.mobile||'').includes(phoneQ))
    }

    // Stats
    document.getElementById('s-customers').textContent = total
    document.getElementById('s-tryons').textContent    = fmtNum(totalTryons)
    document.querySelectorAll('.stat-value.loading').forEach(e=>e.classList.remove('loading'))

    // Pagination
    const from = currentSkip+1
    const to   = Math.min(currentSkip+customers.length, total)
    document.getElementById('page-info').textContent = total
      ? `Showing ${from}–${to} of ${total} customers`
      : 'No customers found'
    document.getElementById('btn-prev').disabled = currentSkip===0
    document.getElementById('btn-next').disabled = (currentSkip+LIMIT)>=total
    document.getElementById('pagination-wrap').style.display = total>LIMIT ? 'flex' : 'none'

    renderGrid(customers)
  } catch(err) {
    toast('Failed to load: '+err.message,'error')
    renderEmpty()
  } finally {
    btn.disabled=false; btn.textContent='↻ Refresh'
  }
}

// ── Fallback: aggregate /agents/:id/tryons ─────────────────
async function fallbackLoadCustomers(agentFilter) {
  const agentIds = agentFilter ? [agentFilter] : Object.keys(agentsMap)
  if (!agentIds.length) return []

  const grouped = {}
  await Promise.all(agentIds.map(async aId => {
    try {
      const data = await apiFetch(`/agents/${aId}/tryons?limit=100`)
      for (const c of (data.customers||[])) {
        const key = `${aId}:${c.mobile}`
        grouped[key] = {
          mobile:        c.mobile,
          agent_id:      aId,
          agent:         agentsMap[aId]||null,
          tryon_count:   c.count||c.tryons?.length||0,
          recent_tryons: (c.tryons||[]).slice(0,4),
          has_base_image:false,
          last_seen_at:  c.tryons?.[0]?.created_at||null,
        }
      }
    } catch {}
  }))

  return Object.values(grouped).sort((a,b)=>{
    const ta = a.last_seen_at ? new Date(a.last_seen_at).getTime() : 0
    const tb = b.last_seen_at ? new Date(b.last_seen_at).getTime() : 0
    return tb-ta
  })
}

// ── Render grid ───────────────────────────────────────────
function renderGrid(customers) {
  const grid = document.getElementById('customers-grid')
  if (!customers.length) { renderEmpty(); return }

  grid.innerHTML = customers.map(c => {
    const agent      = c.agent || agentsMap[c.agent_id] || null
    const agentName  = agent ? (agent.agent_name||agent.business_name||'Agent') : 'Unknown'
    const agentColor = agent?.brand_color || '#7C6FFF'
    const masked     = maskPhone(c.mobile)
    const lastSeen   = c.last_seen_at ? fmtRelative(c.last_seen_at) : '—'
    const tryons     = c.recent_tryons || []
    const count      = c.tryon_count || tryons.length || 0

    const thumbs = [0,1,2,3].map(i => {
      const t = tryons[i]
      if (!t) return `<div class="tryon-thumb"><div class="tryon-thumb-empty">👗</div></div>`
      const url = t.result_url || t.image_url || ''
      const day = fmtDay(t.created_at)
      // Show +N badge on last visible slot if there are more
      const showMore = i===3 && count>4
      return `<div class="tryon-thumb" onclick="openLightbox('${url.replace(/'/g,'&#39;')}','${masked} · ${day}')" title="${day}">
        <img src="${url}" alt="try-on" loading="lazy">
        ${showMore ? `<div class="tryon-more-badge">+${count-3}</div>` : ''}
      </div>`
    }).join('')

    const agentIdSafe   = (c.agent_id||'').replace(/'/g,'')
    const mobileSafe    = (c.mobile||'').replace(/'/g,'')
    const maskedSafe    = masked.replace(/'/g,'')

    return `<div class="customer-card">
      <div class="customer-card-header">
        <div class="customer-avatar" style="background:linear-gradient(135deg,${agentColor},${agentColor}99)">
          ${phoneInitial(c.mobile)}
        </div>
        <div class="customer-info">
          <div class="customer-phone">${masked}</div>
          <div class="customer-meta">
            <span class="agent-chip-sm" style="background:${agentColor}18;color:${agentColor};border:1px solid ${agentColor}30">
              🤖 ${agentName}
            </span>
            ${c.has_base_image ? `<span title="Has base photo" style="font-size:13px">📸</span>` : ''}
          </div>
        </div>
      </div>
      <div class="tryon-strip">${thumbs}</div>
      <div class="customer-card-footer">
        <div class="customer-footer-stats">
          <span class="customer-stat">👗&nbsp;<strong>${count}</strong>&nbsp;try-ons</span>
          <span class="customer-stat">🕐&nbsp;${lastSeen}</span>
        </div>
        <button class="btn btn-secondary btn-sm"
          onclick="openAlbum('${agentIdSafe}','${mobileSafe}','${maskedSafe}')">
          Album →
        </button>
      </div>
    </div>`
  }).join('')
}

function renderEmpty() {
  document.getElementById('customers-grid').innerHTML = `
    <div class="empty-state" style="grid-column:1/-1;padding:64px 20px">
      <div class="empty-icon">👤</div>
      <div class="empty-title">No customers yet</div>
      <div class="empty-desc">When customers interact with your published agents and do a virtual try-on, they'll appear here with their try-on albums.</div>
      <a href="agents.html" class="btn btn-primary" style="margin-top:12px">View Agents →</a>
    </div>`
}

// ── Full album modal ──────────────────────────────────────
async function openAlbum(agentId, mobile, maskedPhone) {
  try {
    const data   = await apiFetch(`/public/album?agent_id=${agentId}&mobile=${encodeURIComponent(mobile)}`, { headers: apiHeaders(false) })
    const tryons = data.tryons || []
    if (!tryons.length) { toast('No try-ons found for this customer', 'info'); return }

    let m = document.getElementById('album-modal')
    if (m) m.remove()
    m = document.createElement('div')
    m.id = 'album-modal'
    m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:998;overflow-y:auto;padding:24px 20px'
    m.innerHTML = `
      <div style="max-width:860px;margin:0 auto;width:100%">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <div>
            <div style="font-size:17px;font-weight:800;color:#fff;letter-spacing:-.02em">${maskedPhone}</div>
            <div style="font-size:12px;color:rgba(255,255,255,.45);margin-top:2px">${tryons.length} try-on${tryons.length!==1?'s':''}</div>
          </div>
          <button onclick="document.getElementById('album-modal').remove()" style="background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px">
          ${tryons.map(t=>`
            <div style="border-radius:10px;overflow:hidden;aspect-ratio:3/4;background:#111;cursor:pointer"
              onclick="openLightbox('${(t.result_url||'').replace(/'/g,'&#39;')}','${fmtDay(t.created_at)}')">
              <img src="${t.result_url||''}" alt="" style="width:100%;height:100%;object-fit:cover;display:block" loading="lazy">
            </div>`).join('')}
        </div>
      </div>`
    m.addEventListener('click', e => { if (e.target===m) m.remove() })
    document.body.appendChild(m)
  } catch(err) {
    toast('Could not load album: '+err.message,'error')
  }
}

// ── Lightbox ──────────────────────────────────────────────
function openLightbox(url, caption) {
  document.getElementById('lb-img').src       = url
  document.getElementById('lb-caption').textContent = caption||''
  document.getElementById('lightbox').classList.add('open')
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open')
  setTimeout(()=>{ document.getElementById('lb-img').src='' },250)
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLightbox() })

// ── Filters ───────────────────────────────────────────────
function onFilterChange() { loadCustomers(true) }
function onSearch() {
  clearTimeout(searchTimer)
  searchTimer = setTimeout(()=>loadCustomers(true),380)
}
function changePage(dir) {
  currentSkip = Math.max(0, currentSkip+dir*LIMIT)
  loadCustomers(false)
  window.scrollTo({top:0,behavior:'smooth'})
}

;(async()=>{
  const nav = await renderNav('conversations')
  if (!nav) return
  await loadAgents()
  await loadCustomers()
  document.getElementById('page-content').style.display = 'block'
})()
</script>
</body>
</html>
